<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Lucky Favicon Generator</title>
<style>
body{font-family:sans-serif;background:#1e1b4b;color:#fff;padding:30px;text-align:center;}
h1{color:#fbbf24;margin-bottom:24px;}
.grid{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin-bottom:30px;}
.item{background:#312e81;padding:16px;border-radius:12px;}
.item p{font-size:12px;color:#a5b4fc;margin:8px 0 0;}
button{background:#d97706;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin:4px;}
button:hover{background:#b45309;}
.dl-btn{background:#059669;}
.dl-btn:hover{background:#047857;}
</style>
</head>
<body>
<h1>🍀 Lucky Favicon Generator</h1>
<div class="grid" id="previews"></div>
<button onclick="downloadAll()">⬇ Download All Sizes</button>

<script>
const SIZES = [
  { name:'favicon-16x16.png',    size:16  },
  { name:'favicon-32x32.png',    size:32  },
  { name:'favicon-96x96.png',    size:96  },
  { name:'apple-touch-icon.png', size:180 },
  { name:'android-chrome-192.png', size:192 },
  { name:'android-chrome-512.png', size:512 },
];

function drawIcon(size) {
  const cvs = document.createElement('canvas');
  cvs.width = cvs.height = size;
  const ctx = cvs.getContext('2d');
  const S = size;

  // Background circle gradient
  const bg = ctx.createRadialGradient(S*0.4, S*0.35, 0, S/2, S/2, S*0.6);
  bg.addColorStop(0, '#4c1d95');
  bg.addColorStop(1, '#1e1b4b');
  ctx.fillStyle = bg;
  // Rounded square background
  const r = S * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(S - r, 0);
  ctx.quadraticCurveTo(S, 0, S, r);
  ctx.lineTo(S, S - r);
  ctx.quadraticCurveTo(S, S, S - r, S);
  ctx.lineTo(r, S);
  ctx.quadraticCurveTo(0, S, 0, S - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Gold bottom accent
  ctx.fillStyle = '#d97706';
  ctx.globalAlpha = 0.5;
  ctx.fillRect(0, S * 0.88, S, S * 0.12);
  ctx.globalAlpha = 1;

  // Clover emoji
  ctx.font = `${Math.round(S * 0.62)}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🍀', S / 2, S * 0.48);

  return cvs;
}

function init() {
  const container = document.getElementById('previews');
  SIZES.forEach(s => {
    const cvs = drawIcon(s.size);
    // Show preview at reasonable size
    const display = Math.min(s.size, 96);
    cvs.style.width  = display + 'px';
    cvs.style.height = display + 'px';
    cvs.style.imageRendering = 'pixelated';
    const div = document.createElement('div');
    div.className = 'item';
    div.appendChild(cvs);
    const p = document.createElement('p');
    p.textContent = s.name + ` (${s.size}×${s.size})`;
    div.appendChild(p);
    const btn = document.createElement('button');
    btn.className = 'dl-btn';
    btn.style.fontSize = '11px';
    btn.style.padding = '6px 12px';
    btn.style.marginTop = '8px';
    btn.textContent = 'Download';
    btn.onclick = () => download(cvs, s.name);
    div.appendChild(btn);
    container.appendChild(div);
  });
}

function download(cvs, name) {
  const a = document.createElement('a');
  a.href = cvs.toDataURL('image/png');
  a.download = name;
  a.click();
}

async function downloadAll() {
  for (const s of SIZES) {
    const cvs = drawIcon(s.size);
    download(cvs, s.name);
    await new Promise(r => setTimeout(r, 300));
  }
  alert('All favicon files downloaded!');
}

init();
</script>
</body>
</html>
